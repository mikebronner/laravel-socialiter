name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['10.*', '11.*', '12.*']
        exclude:
          - php: '8.2'
            laravel: '13.*'
        include:
          - php: '8.3'
            laravel: '13.*'
          - php: '8.4'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite
          coverage: none

      - name: Set Laravel version
        run: |
          composer require "illuminate/auth:${{ matrix.laravel }}" "illuminate/database:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}" --no-interaction --no-update

      - name: Allow dev dependencies for Laravel 12
        if: matrix.laravel == '12.*'
        run: |
          composer config minimum-stability dev
          composer config prefer-stable true
          composer require "genealabs/laravel-overridable-model:dev-feat/3-add-laravel-13-support as 12.0.0" --no-interaction --no-update

      - name: Allow dev dependencies for Laravel 13
        if: matrix.laravel == '13.*'
        run: |
          composer config minimum-stability dev
          composer config prefer-stable true
          composer require "genealabs/laravel-overridable-model:dev-feat/3-add-laravel-13-support as 13.0.0" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: |
          if [ -f vendor/bin/pest ]; then
            vendor/bin/pest
          elif [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "No test runner found — skipping"
          fi
